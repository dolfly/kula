# Kula-Szpiegula Configuration

# Global settings
global:
  # Overwrite reports hostname (default: system hostname)
  hostname: ""
  # Toggle display of OS, Kernel, and Architecture (default: true)
  show_system_info: true
  # Default theme for the web UI: light or dark (default: dark)
  default_theme: dark

# Data collection settings
collection:
  interval: 1s

# Storage settings (tiered ring-buffer)
storage:
  # Insufficient permissions fallbacks to ~/.kula
  directory: /var/lib/kula
  tiers:
    # Tier 1: 1-second resolution
    - resolution: 1s
      max_size: 250MB
    # Tier 2: 1-minute aggregation
    - resolution: 1m
      max_size: 150MB
    # Tier 3: 5-minute aggregation
    - resolution: 5m
      max_size: 50MB

# Web UI settings
web:
  enabled: true
  listen: "127.0.0.1" # use [] brackets for IPv6 addresses, e.g. "[::1]"
  port: 8080

  # Trust X-Forwarded-Proto headers from reverse proxies for the Secure cookie flag
  trust_proxy: false

  # Join data points across gaps in the graphs (default: false)
  # When false, gaps between measurements are displayed as empty space
  join_metrics: false

  # API Access and Performance Logging
  logging:
    enabled: true
    # "access" (basic request details) or "perf" (adds DB fetch metrics)
    level: "perf"

  # Authentication (optional)
  auth:
    enabled: false
    username: admin
    # Generate hash and salt with: ./kula hash-password
    # Copy the output into the fields below:
    password_hash: ""
    password_salt: ""
    session_timeout: 24h
    argon2:
      # Tune based on modern hardware:
      # https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
      # time: 2-4, memory: 65536-262144
      time: 1
      memory: 65536
      threads: 4

# TUI settings
tui:
  refresh_rate: 1s
